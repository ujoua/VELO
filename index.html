<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VELO City - Auto Audio</title>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: #121212;
            color: white;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding-top: 50px;
            overflow: hidden;
            touch-action: none;
        }

        #display {
            width: 95%;
            max-width: 800px;
            height: 180px;
            margin: 20px auto;
            border: 3px solid #333;
            border-radius: 15px;
            background: #1e1e1e;
            position: relative;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 5px;
        }

        .rythm-box {
            width: 13%;
            height: 130px;
            border: 2px solid #444;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: bold;
            color: #444;
            position: relative;
        }

        .rythm-box.active {
            background: #fff;
            border-color: #fff;
            color: #121212;
            box-shadow: 0 0 15px #fff;
        }

        .rythm-box[data-index="6"].preview-hold {
            color: #ffeb3b;
            border-color: #ffeb3b;
        }

        .rythm-box[data-index="6"].preview-vel {
            color: #bc00ff;
            border-color: #bc00ff;
        }

        #overlay-value {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: 900;
            z-index: 20;
            display: none;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        #log {
            font-size: 2.2rem;
            margin-top: 20px;
            min-height: 1.5em;
            font-weight: bold;
        }

        .ms-offset {
            font-size: 1.2rem;
            margin-left: 10px;
            opacity: 0.8;
            font-family: monospace;
        }
    </style>
</head>

<body>

    <h1>VELO City</h1>
    <div id="log">LOADING MUSIC...</div>

    <div id="display">
        <div id="overlay-value">0</div>
        <div class="rythm-box" data-index="0">1</div>
        <div class="rythm-box" data-index="1">2</div>
        <div class="rythm-box" data-index="2">3</div>
        <div class="rythm-box" data-index="3">4</div>
        <div class="rythm-box" data-index="4">5</div>
        <div class="rythm-box" data-index="5">6</div>
        <div class="rythm-box" data-index="6">7</div>
    </div>

    <script>
        /**
         * 설정 영역
         */
        const MUSIC_URL = 'data/spring-vivaldi.mp3'; // 불러올 음악 파일 경로를 여기에 적으세요.
        const NOTES_JSON_URL = 'data/spring-vivaldi.json'; // 노트 데이터 경로

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        const INITIAL_SPEED = 0.02;
        const ACCELERATION = 0.00015;

        let notesData = [];
        let musicBuffer = null;
        let musicSource = null;
        let startTime = 0; // 음악 재생이 시작된 AudioContext 시간
        let isStarted = false;
        let activeEvents = [];

        // 1. 노트 데이터 로드
        fetch(NOTES_JSON_URL)
            .then(res => res.json())
            .then(data => { notesData = data; })
            .catch(err => console.error("Notes load error:", err));

        // 2. 음악 파일 로드 함수
        async function initAudio() {
            try {
                const response = await fetch(MUSIC_URL);
                const arrayBuffer = await response.arrayBuffer();
                musicBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                document.getElementById('log').innerText = "TAP TO START";
            } catch (e) {
                document.getElementById('log').innerText = "MUSIC ERROR";
                console.error("Audio init error:", e);
            }
        }

        initAudio();

        function playBeep(freq, vol = 0.1, dur = 0.1) {
            if (audioCtx.state !== 'running') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        function update() {
            if (!isStarted) return;

            // 현재 흐른 시간 계산 (단위: ms)
            const now = (audioCtx.currentTime - startTime) * 1000;
            const boxes = document.querySelectorAll('.rythm-box');
            const overlay = document.getElementById('overlay-value');

            // 큐에서 노트를 꺼내 활성 이벤트 리스트에 추가
            if (notesData.length > 0) {
                const nextData = notesData[0];
                const beatDur = 60000 / nextData.bpm;
                if (now >= nextData.time - (beatDur * 6)) {
                    const ev = notesData.shift();
                    ev.beatDur = beatDur;
                    ev.startTime = ev.time - (beatDur * 6);
                    ev.isFinished = false;
                    ev.isHolding = false;
                    ev.lastPlayedBeat = -1;
                    ev.holdBeatCounter = 0;
                    activeEvents.push(ev);
                }
            }

            // 그래픽 초기화
            boxes.forEach(box => {
                box.classList.remove('active', 'preview-hold', 'preview-vel');
                box.innerText = parseInt(box.dataset.index) + 1;
            });

            // 우측 예고(Preview) 처리
            const previewTargets = activeEvents.filter(ev => !ev.isFinished && !ev.isHolding && now >= ev.time - (ev.beatDur * 3.5) && now < ev.time).sort((a, b) => a.time - b.time);
            if (previewTargets.length > 0) {
                const target = previewTargets[0];
                const lastBox = boxes[6];
                if (target.duration) { lastBox.classList.add('preview-hold'); lastBox.innerText = `HOLD(${target.duration})`; }
                else if (target.velocity) { lastBox.classList.add('preview-vel'); lastBox.innerText = `VAL(${target.velocity})`; }
            }

            // 각 활성 노트 업데이트
            activeEvents.forEach(ev => {
                if (ev.isFinished) return;
                const elapsed = now - ev.startTime;
                const currentBeat = Math.floor(elapsed / ev.beatDur);

                if (!ev.isHolding && currentBeat <= 6) {
                    if (currentBeat > ev.lastPlayedBeat) {
                        ev.lastPlayedBeat = currentBeat;
                        if (currentBeat >= 0) playBeep(440, 0.05);
                    }
                    const targetBox = boxes[currentBeat];
                    if (targetBox) targetBox.classList.add('active');
                }

                if (ev.isHolding) {
                    overlay.style.display = 'block';
                    const hElapsed = now - ev.pressStartTime;
                    if (ev.velocity) {
                        const val = (INITIAL_SPEED * hElapsed) + (0.5 * ACCELERATION * hElapsed * hElapsed);
                        overlay.innerText = Math.floor(val);
                        overlay.style.color = "#bc00ff";
                    } else {
                        const hBeat = Math.floor(hElapsed / ev.beatDur);
                        if (hBeat > ev.holdBeatCounter) {
                            ev.holdBeatCounter = hBeat;
                            overlay.innerText = ev.holdBeatCounter;
                            playBeep(660, 0.05);
                        }
                        overlay.style.color = "#ffeb3b";
                    }
                }

                // 판정 범위 벗어난 미스 처리
                if (!ev.isHolding && now > ev.time + 250) { finalize(ev, 999); }
            });
            requestAnimationFrame(update);
        }

        function finalize(ev, diff) {
            ev.isFinished = true;
            let msg = "MISS";
            let color = "#ff4444";

            if (Math.abs(diff) < 80) { msg = "PERFECT"; color = "#00ffcc"; }
            else if (Math.abs(diff) < 150) { msg = "GREAT"; color = "#ffcc00"; }

            const logEl = document.getElementById('log');
            const offsetText = (diff === 999) ? "" : `<span class="ms-offset" style="color:${color}">${Math.round(diff)}ms</span>`;
            logEl.innerHTML = `<span style="color:${color}">${msg}</span>${offsetText}`;

            document.getElementById('overlay-value').style.display = 'none';
            document.getElementById('overlay-value').innerText = "0";
            activeEvents = activeEvents.filter(a => a !== ev);
            playBeep(msg === "MISS" ? 200 : 880, 0.1, 0.2);
        }

        async function handleStart(e) {
            if (e.type === 'keydown' && (e.code !== 'Space' || e.repeat)) return;
            if (e.cancelable) e.preventDefault();

            if (audioCtx.state === 'suspended') await audioCtx.resume();

            // 게임 및 음악 시작
            if (!isStarted) {
                if (!musicBuffer) return; // 아직 로딩 중이면 무시

                isStarted = true;
                document.getElementById('log').innerText = "GO!";

                musicSource = audioCtx.createBufferSource();
                musicSource.buffer = musicBuffer;
                musicSource.connect(audioCtx.destination);

                startTime = audioCtx.currentTime;
                musicSource.start(0);

                requestAnimationFrame(update);
                return;
            }

            // 노트 타격 처리
            const hitTime = (audioCtx.currentTime - startTime) * 1000;
            const ev = activeEvents.find(a => !a.isFinished && !a.isHolding && Math.abs(hitTime - a.time) < 400);
            if (!ev) return;

            const diff = hitTime - ev.time;
            if (Math.abs(diff) > 150) { finalize(ev, diff); return; }

            if (ev.duration || ev.velocity) {
                ev.isHolding = true;
                ev.pressStartTime = hitTime;
                if (ev.velocity) {
                    const a = 0.5 * ACCELERATION, b = INITIAL_SPEED, c = -ev.velocity;
                    ev.targetChargeTime = (-b + Math.sqrt(b * b - 4 * a * c)) / (2 * a);
                }
            } else { finalize(ev, diff); }
        }

        function handleEnd(e) {
            const ev = activeEvents.find(a => a.isHolding);
            if (ev) {
                const relTime = (audioCtx.currentTime - startTime) * 1000;
                let diff = ev.velocity ? (relTime - ev.pressStartTime) - ev.targetChargeTime : (relTime - (ev.time + (ev.duration * ev.beatDur)));
                finalize(ev, diff);
            }
        }

        window.addEventListener('keydown', handleStart);
        window.addEventListener('keyup', handleEnd);
        window.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('touchend', handleEnd, { passive: false });
    </script>
</body>

</html>
