<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VELO City - Rhythm Web Game</title>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
        }

        body {
            background: #121212;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow: hidden;
            touch-action: none;
            text-align: center;
        }

        /* 화면 전환용 컨테이너 */
        .screen {
            display: none;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .active-screen {
            display: flex;
        }

        /* [1] 메인 시작 화면 */
        #start-screen {
            background: radial-gradient(circle, #2c003e 0%, #000000 100%);
        }

        #start-screen h1 {
            font-size: 5rem;
            letter-spacing: 15px;
            margin-bottom: 20px;
            text-shadow: 0 0 30px #bc00ff;
            font-style: italic;
        }

        .tap-msg {
            font-size: 1.2rem;
            color: #aaa;
            animation: blink 1.5s infinite;
        }

        /* [2] 곡 선택 화면 */
        #select-screen {
            background: #121212;
            padding: 20px;
        }

        .song-list {
            width: 95%;
            max-width: 500px;
            max-height: 70vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 10px;
        }

        .song-card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            border-left: 6px solid #bc00ff;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }

        .song-card:active {
            transform: scale(0.95);
            background: #2a2a2a;
        }

        .song-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .song-info {
            color: #888;
            font-size: 0.9rem;
        }

        /* [3] 게임 화면 */
        #game-screen {
            padding-top: 50px;
        }

        #display {
            width: 95%;
            max-width: 800px;
            height: 180px;
            margin: 20px auto;
            border: 3px solid #333;
            border-radius: 15px;
            background: #1e1e1e;
            position: relative;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 5px;
        }

        .rythm-box {
            width: 13%;
            height: 130px;
            border: 2px solid #444;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: bold;
            color: #444;
            position: relative;
        }

        .rythm-box.active {
            background: #fff;
            border-color: #fff;
            color: #121212;
            box-shadow: 0 0 15px #fff;
        }

        .rythm-box[data-index="6"].preview-hold {
            color: #ffeb3b;
            border-color: #ffeb3b;
        }

        .rythm-box[data-index="6"].preview-vel {
            color: #bc00ff;
            border-color: #bc00ff;
        }

        #overlay-value {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            font-size: 4.5rem;
            font-weight: 900;
            z-index: 20;
            display: none;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
            opacity: 1;
        }

        #overlay-value.fade-out {
            opacity: 0;
            transform: translate(-50%, -65%) scale(1.1);
        }

        #log {
            font-size: 2.2rem;
            margin-top: 20px;
            min-height: 1.5em;
            font-weight: bold;
        }

        .ms-offset {
            font-size: 1.2rem;
            margin-left: 10px;
            opacity: 0.8;
            font-family: monospace;
        }

        /* [4] 결과 화면 */
        #result-screen {
            background: rgba(0, 0, 0, 0.95);
        }

        .result-container {
            background: #1e1e1e;
            padding: 25px 40px;
            border-radius: 20px;
            border: 2px solid #bc00ff;
            box-shadow: 0 0 30px rgba(188, 0, 255, 0.3);
            min-width: 340px;
        }

        #res-song-title {
            font-size: 1.6rem;
            font-weight: bold;
            margin: 10px 0;
            color: #fff;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        #res-rank {
            font-size: 6rem;
            font-weight: 900;
            margin: 5px 0;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            font-style: italic;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.3rem;
            margin: 8px 0;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }

        .back-btn {
            margin-top: 25px;
            padding: 15px 40px;
            background: #bc00ff;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .back-btn:active {
            transform: scale(0.9);
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }
    </style>
</head>

<body>

    <!-- 메인 화면 -->
    <div id="start-screen" class="screen active-screen" onclick="showSelectScreen()">
        <h1>VELO City</h1>
        <div class="tap-msg">TOUCH TO START</div>
    </div>

    <!-- 곡 선택 화면 -->
    <div id="select-screen" class="screen">
        <h2 style="margin-bottom: 20px; letter-spacing: 2px;">SELECT MUSIC</h2>
        <div class="song-list" id="song-list"></div>
    </div>

    <!-- 게임 화면 -->
    <div id="game-screen" class="screen">
        <h1 id="game-title" style="margin: 0; font-size: 1.5rem; opacity: 0.7;">VELO City</h1>
        <div id="log">LOADING...</div>
        <div id="display">
            <div id="overlay-value">0</div>
            <div class="rythm-box" data-index="0">1</div>
            <div class="rythm-box" data-index="1">2</div>
            <div class="rythm-box" data-index="2">3</div>
            <div class="rythm-box" data-index="3">4</div>
            <div class="rythm-box" data-index="4">5</div>
            <div class="rythm-box" data-index="5">6</div>
            <div class="rythm-box" data-index="6">7</div>
        </div>
    </div>

    <!-- 결과 화면 -->
    <div id="result-screen" class="screen">
        <div class="result-container">
            <h2 id="res-title" style="color:#bc00ff; font-size: 1.2rem; margin: 0; opacity: 0.8;">RESULT</h2>
            <div id="res-song-title">Music Title</div>
            <div id="res-rank">S</div>
            <div class="stat-row"><span>PERFECT</span><span id="res-perfect" style="color:#00ffcc">0</span></div>
            <div class="stat-row"><span>GREAT</span><span id="res-great" style="color:#ffcc00">0</span></div>
            <div class="stat-row"><span>MISS</span><span id="res-miss" style="color:#ff4444">0</span></div>
            <button class="back-btn" onclick="backToSelect()">MUSIC LIST</button>
        </div>
    </div>

    <script>
        let songsData = [];
        let currentMusicUrl = '';
        let currentNotesUrl = '';
        let notesData = [];
        let musicBuffer = null;
        let musicSource = null;
        let startTime = 0;
        let isStarted = false;
        let isGameOver = false;
        let activeEvents = [];
        let gameStats = { perfect: 0, great: 0, miss: 0 };
        let touchOrigin = { x: 0, y: 0, t: 0 };
        let currentFlickVal = 0;
        let fadeTimeout = null;

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        const INITIAL_SPEED = 0.000001;
        const ACCELERATION = 0.00025;
        const SENSITIVITY = 120;

        async function showSelectScreen() {
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            document.getElementById('start-screen').classList.remove('active-screen');
            document.getElementById('result-screen').classList.remove('active-screen');
            document.getElementById('select-screen').classList.add('active-screen');

            if (songsData.length === 0) {
                try {
                    const res = await fetch('data/songs.json');
                    songsData = await res.json();
                    renderSongList();
                } catch (e) { console.error("songs.json 로드 실패:", e); }
            }
        }

        function renderSongList() {
            const listEl = document.getElementById('song-list');
            listEl.innerHTML = songsData.map(song => `
                <div class="song-card" onclick="selectSong('${song.musicUrl}', '${song.jsonUrl}', '${song.title}')">
                    <div class="song-title">${song.title}</div>
                    <div class="song-info">${song.artist} | BPM: ${song.bpm || '???'}</div>
                </div>
            `).join('');
        }

        async function selectSong(mUrl, jUrl, title) {
            currentMusicUrl = mUrl;
            currentNotesUrl = jUrl;
            document.getElementById('game-title').innerText = title;
            document.getElementById('select-screen').classList.remove('active-screen');
            document.getElementById('game-screen').classList.add('active-screen');
            await initGame();
        }

        async function initGame() {
            isStarted = false;
            isGameOver = false;
            activeEvents = [];
            gameStats = { perfect: 0, great: 0, miss: 0 };
            document.getElementById('log').innerText = "LOADING MUSIC...";
            try {
                const nRes = await fetch(currentNotesUrl);
                notesData = await nRes.json();
                const aRes = await fetch(currentMusicUrl);
                const arrayBuffer = await aRes.arrayBuffer();
                musicBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                document.getElementById('log').innerText = "TAP TO START";
            } catch (e) {
                document.getElementById('log').innerText = "LOAD ERROR";
            }
        }

        function backToSelect() {
            isStarted = false;
            if (musicSource) { try { musicSource.stop(); } catch (e) { } }
            showSelectScreen();
        }

        function showResult() {
            isStarted = false;
            document.getElementById('game-screen').classList.remove('active-screen');
            document.getElementById('result-screen').classList.add('active-screen');

            // 곡 제목 설정
            const currentTitle = document.getElementById('game-title').innerText;
            document.getElementById('res-song-title').innerText = currentTitle;

            const notPerfect = gameStats.great + gameStats.miss;
            let rank = "F";
            let rankColor = "#ff4444";
            let titleText = "RESULT";

            if (isGameOver || gameStats.miss > 8) {
                rank = "F";
                rankColor = "#ff4444";
                titleText = "GAME OVER";
            } else {
                if (notPerfect === 0) { rank = "S"; rankColor = "#00ffcc"; }
                else if (notPerfect <= 2) { rank = "A"; rankColor = "#ffeb3b"; }
                else if (notPerfect <= 4) { rank = "B"; rankColor = "#ffcc00"; }
                else if (notPerfect <= 6) { rank = "C"; rankColor = "#ff9800"; }
                else { rank = "D"; rankColor = "#888"; }
            }

            const rankEl = document.getElementById('res-rank');
            rankEl.innerText = rank;
            rankEl.style.color = rankColor;
            document.getElementById('res-title').innerText = titleText;

            document.getElementById('res-perfect').innerText = gameStats.perfect;
            document.getElementById('res-great').innerText = gameStats.great;
            document.getElementById('res-miss').innerText = gameStats.miss;
        }

        function triggerGameOver() {
            if (isGameOver) return;
            isGameOver = true;
            isStarted = false;
            if (musicSource) {
                musicSource.onended = null;
                try { musicSource.stop(); } catch (e) { }
            }
            playBeep(100, 0.3, 0.5);
            showResult();
        }

        function playBeep(freq, vol = 0.1, dur = 0.1) {
            if (audioCtx.state !== 'running') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        function update() {
            if (!isStarted || isGameOver) return;
            const now = (audioCtx.currentTime - startTime) * 1000;
            const boxes = document.querySelectorAll('.rythm-box');
            const overlay = document.getElementById('overlay-value');

            if (notesData.length > 0) {
                const nextData = notesData[0];
                const beatDur = 60000 / nextData.bpm;
                if (now >= nextData.time - (beatDur * 6)) {
                    const ev = notesData.shift();
                    ev.beatDur = beatDur;
                    ev.startTime = ev.time - (beatDur * 6);
                    ev.isFinished = false;
                    ev.isHolding = false;
                    ev.lastPlayedBeat = -1;
                    ev.holdBeatCounter = 0;
                    activeEvents.push(ev);
                }
            }

            boxes.forEach(box => {
                box.classList.remove('active', 'preview-hold', 'preview-vel');
                box.innerText = parseInt(box.dataset.index) + 1;
            });

            const previewTargets = activeEvents.filter(ev => !ev.isFinished && !ev.isHolding && now >= ev.time - (ev.beatDur * 3.5) + 1000 && now < ev.time).sort((a, b) => a.time - b.time);
            if (previewTargets.length > 0) {
                const target = previewTargets[0];
                const lastBox = boxes[6];
                if (target.duration) { lastBox.classList.add('preview-hold'); lastBox.innerText = `HOLD(${target.duration})`; }
                else if (target.velocity) { lastBox.classList.add('preview-vel'); lastBox.innerText = `FLICK(${target.velocity})`; }
            }

            activeEvents.forEach(ev => {
                if (ev.isFinished) return;
                const elapsed = now - ev.startTime;
                const currentBeat = Math.floor(elapsed / ev.beatDur);

                if (!ev.isHolding && currentBeat <= 6) {
                    if (currentBeat > ev.lastPlayedBeat) {
                        ev.lastPlayedBeat = currentBeat;
                        if (currentBeat >= 0) playBeep(440, 0.05);
                    }
                    const targetBox = boxes[currentBeat];
                    if (targetBox) targetBox.classList.add('active');
                }

                if (ev.isHolding) {
                    clearTimeout(fadeTimeout);
                    overlay.classList.remove('fade-out');
                    overlay.style.display = 'block';
                    const hElapsed = now - ev.pressStartTime;
                    if (ev.velocity) {
                        const displayVal = ev.isFlickMode ? currentFlickVal : (INITIAL_SPEED * hElapsed) + (0.5 * ACCELERATION * hElapsed * hElapsed);
                        overlay.innerText = Math.floor(displayVal);
                        overlay.style.color = "#bc00ff";
                    } else {
                        const hBeat = Math.floor(hElapsed / ev.beatDur);
                        if (hBeat > ev.holdBeatCounter) {
                            ev.holdBeatCounter = hBeat;
                            overlay.innerText = ev.holdBeatCounter;
                            playBeep(660, 0.05);
                        }
                        overlay.style.color = "#ffeb3b";
                    }
                }
                if (!ev.isHolding && now > ev.time + 250) { finalize(ev, 999); }
            });
            requestAnimationFrame(update);
        }

        function finalize(ev, diff) {
            ev.isFinished = true;
            let msg = "MISS";
            let color = "#ff4444";

            if (Math.abs(diff) < 80) {
                msg = "PERFECT"; color = "#00ffcc"; gameStats.perfect++;
            } else if (Math.abs(diff) < 150) {
                msg = "GREAT"; color = "#ffcc00"; gameStats.great++;
            } else {
                gameStats.miss++;
                if (gameStats.miss > 8) {
                    triggerGameOver();
                    return;
                }
            }

            const logEl = document.getElementById('log');
            const offsetText = (diff === 999) ? "" : `<span class="ms-offset" style="color:${color}">${Math.round(diff)}ms</span>`;
            logEl.innerHTML = `<span style="color:${color}">${msg}</span>${offsetText}`;

            const overlay = document.getElementById('overlay-value');
            overlay.classList.add('fade-out');
            fadeTimeout = setTimeout(() => {
                overlay.style.display = 'none';
                overlay.classList.remove('fade-out');
                overlay.innerText = "0";
                currentFlickVal = 0;
            }, 300);

            activeEvents = activeEvents.filter(a => a !== ev);
            playBeep(msg === "MISS" ? 200 : 880, 0.1, 0.2);
        }

        async function handleStart(e) {
            if (e.type === 'keydown' && (e.code !== 'Space' || e.repeat)) return;
            if (!document.getElementById('game-screen').classList.contains('active-screen')) return;
            if (isGameOver) return;
            if (e.cancelable) e.preventDefault();

            if (audioCtx.state === 'suspended') await audioCtx.resume();

            if (!isStarted) {
                if (!musicBuffer) return;
                isStarted = true;
                musicSource = audioCtx.createBufferSource();
                musicSource.buffer = musicBuffer;
                musicSource.connect(audioCtx.destination);
                musicSource.onended = () => { if (!isGameOver) setTimeout(showResult, 1500); };
                startTime = audioCtx.currentTime;
                musicSource.start(0);
                requestAnimationFrame(update);
                return;
            }

            const hitTime = (audioCtx.currentTime - startTime) * 1000;
            const ev = activeEvents.find(a => !a.isFinished && !a.isHolding && Math.abs(hitTime - a.time) < 400);
            if (!ev) return;

            if (Math.abs(hitTime - ev.time) > 150) { finalize(ev, hitTime - ev.time); return; }

            if (ev.duration || ev.velocity) {
                ev.isHolding = true;
                ev.pressStartTime = hitTime;
                ev.isFlickMode = (e.type === 'touchstart' && ev.velocity);
                if (ev.isFlickMode) {
                    const t = e.touches[0];
                    touchOrigin = { x: t.clientX, y: t.clientY, t: hitTime };
                } else if (ev.velocity) {
                    const a = 0.5 * ACCELERATION, b = INITIAL_SPEED, c = -ev.velocity;
                    ev.targetChargeTime = (-b + Math.sqrt(b * b - 4 * a * c)) / (2 * a);
                }
            } else { finalize(ev, hitTime - ev.time); }
        }

        function handleMove(e) {
            if (isGameOver) return;
            const ev = activeEvents.find(a => a.isHolding && a.isFlickMode);
            if (ev && e.touches) {
                const now = (audioCtx.currentTime - startTime) * 1000;
                const t = e.touches[0];
                const dist = Math.sqrt(Math.pow(t.clientX - touchOrigin.x, 2) + Math.pow(t.clientY - touchOrigin.y, 2));
                const dur = Math.max(now - touchOrigin.t, 10);
                currentFlickVal = (dist / dur) * SENSITIVITY;
            }
        }

        function handleEnd(e) {
            if (isGameOver) return;
            const ev = activeEvents.find(a => a.isHolding);
            if (ev) {
                const relTime = (audioCtx.currentTime - startTime) * 1000;
                let diff;
                if (ev.isFlickMode) {
                    diff = Math.abs(ev.velocity - currentFlickVal);
                    diff = Math.pow(diff, 1.2);
                } else {
                    diff = ev.velocity ? (relTime - ev.pressStartTime) - ev.targetChargeTime : (relTime - (ev.time + (ev.duration * ev.beatDur)));
                }
                finalize(ev, diff);
            }
        }

        window.addEventListener('keydown', handleStart);
        window.addEventListener('keyup', handleEnd);
        window.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd, { passive: false });
    </script>
</body>

</html>
